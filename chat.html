    <style>
        /* استيراد ملف CSS الرئيسي */
        @import url('styles.css');

        /* أنماط إضافية مخصصة لصفحة المحادثة */
        .chat-page-wrapper {
            min-height: 100vh;
            background: linear-gradient(145deg, #f0e6ff, #e6d9ff);
            padding: 1.5rem;
        }

        .chat-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.15);
            overflow: hidden;
            border: 1px solid #d9c9ff;
        }

        /* الهيدر العلوي - أبيض */
        .chat-header {
            background: white;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border-bottom: 2px solid #b79eff;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .header-right h1 {
            margin: 0;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #7c4dff;
            font-weight: 800;
        }

        .header-right h1 i {
            color: #7c4dff;
        }

        /* القائمة العلوية - بيضاء */
        .top-nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 0.5rem;
        }

        .top-nav a {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            color: #555555;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            background: #f8f4ff;
            border: 1px solid #e6d9ff;
        }

        .top-nav a:hover {
            background: #b79eff;
            color: white;
            border-color: #9f7aea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.2);
        }

        .top-nav a.active {
            background: #9f7aea;
            color: white;
            border-color: #8b5cf6;
        }

        /* صندوق المحادثة - موف فاتح */
        .chat-main {
            height: 600px;
            display: flex;
            flex-direction: column;
            background: #f5f0ff;
        }

        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: #f5f0ff;
        }

        /* تنسيقات المحادثة */
        .message {
            display: flex;
            width: 100%;
            animation: fadeIn 0.25s ease-out;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 70%;
            padding: 1rem 1.5rem;
            border-radius: 1.8rem;
            font-size: 1rem;
            line-height: 1.6;
            word-wrap: break-word;
            box-shadow: 0 2px 10px rgba(139, 92, 246, 0.1);
        }

        .user .bubble {
            background: #d4c2ff;
            color: #2d1f4a;
            border-bottom-left-radius: 0.5rem;
        }

        .ai .bubble {
            background: #ffffff;
            color: #4a4a4a;
            border-bottom-right-radius: 0.5rem;
            border: 1px solid #e6d9ff;
        }

        .timestamp {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-top: 5px;
            display: block;
            text-align: left;
            color: #7c6a9c;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.8rem 1.8rem;
            background: white;
            border-radius: 2rem;
            width: fit-content;
            border-bottom-right-radius: 0.5rem;
            border: 1px solid #e6d9ff;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #9f7aea;
            border-radius: 50%;
            display: inline-block;
            margin-left: 4px;
            animation: wave 1.3s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        .typing-text {
            font-size: 0.9rem;
            color: #7c6a9c;
            opacity: 0.9;
        }

        .chat-footer {
            padding: 1.2rem 1.5rem;
            background: #f0e6ff;
            border-top: 1px solid #d9c9ff;
        }

        .input-form {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .input-form input {
            flex: 1;
            padding: 1rem 1.5rem;
            border: 2px solid #d9c9ff;
            background: white;
            border-radius: 60px;
            font-size: 1rem;
            outline: none;
            color: #4a4a4a;
            font-family: 'Cairo', sans-serif;
        }

        .input-form input::placeholder {
            color: #b39ddb;
        }

        .input-form input:focus {
            border-color: #9f7aea;
            box-shadow: 0 0 0 3px rgba(159, 122, 234, 0.2);
        }

        .input-form button {
            background: #9f7aea;
            border: none;
            padding: 1rem 2rem;
            border-radius: 60px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
        }

        .input-form button:hover {
            background: #8b5cf6;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.3);
        }

        .clear-btn {
            background: white;
            border: 1px solid #d9c9ff;
            border-radius: 40px;
            padding: 0.4rem 1.2rem;
            color: #7c6a9c;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .clear-btn:hover {
            background: #f0e6ff;
            border-color: #9f7aea;
            color: #8b5cf6;
        }

        .chat-window::-webkit-scrollbar {
            width: 8px;
        }

        .chat-window::-webkit-scrollbar-track {
            background: #f0e6ff;
            border-radius: 10px;
        }

        .chat-window::-webkit-scrollbar-thumb {
            background: #c4b0ff;
            border-radius: 10px;
        }

        .chat-window::-webkit-scrollbar-thumb:hover {
            background: #9f7aea;
        }

            .chat-header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }

                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
                width: 100%;
            }
            
            .top-nav ul {
                flex-wrap: wrap;
                width: 100%;
            }
            
            .top-nav a {
                flex: 1 1 auto;
                justify-content: center;
            }
            
            .bubble {
                max-width: 90%;
            }
        }

        @media (max-width: 576px) {
            .input-form {
                flex-direction: column;
            }
            
            .input-form button {
                width: 100%;
            }
            
            .top-nav ul {
                flex-direction: column;
            }
            
            .top-nav a {
                width: 100%;
                justify-content: center;
            }
        }
    </style>

    <script>
        // ============================================
        // قاعدة البيانات
        // ============================================
        (function() {
            if (typeof Dexie !== 'undefined' && !window.idosDB) {
                const db = new Dexie('IDOSHealthDB');
                
                db.version(1).stores({
                    diagnosisHistory: '++id, disease, department, timestamp, symptoms, advice',
                    chatHistory: '++id, author, message, timestamp',
                    userSettings: '++id, key, value',
                    userSessions: '++id, email, name, timestamp, isActive',
                    favoriteHospitals: '++id, hospitalId, name, location, addedAt',
                    vitalSigns: '++id, type, value, status, timestamp'
                });
                
                db.open().catch(err => {
                    console.error('❌ فشل في فتح قاعدة البيانات:', err);
                });
                
                window.idosDB = db;
                
                window.idosDB.chat = {
                    async add(message) {
                        try {
                            return await db.chatHistory.add({
                                ...message,
                                timestamp: message.timestamp || new Date().toISOString()
                            });
                        } catch (error) {
                            console.error('❌ خطأ في حفظ الرسالة:', error);
                            throw error;
                        }
                    },
                    
                    async getHistory(limit = 50) {
                        try {
                            return await db.chatHistory
                                .orderBy('timestamp')
                                .limit(limit)
                                .toArray();
                        } catch (error) {
                            console.error('❌ خطأ في استرجاع المحادثات:', error);
                            return [];
                        }
                    },
                    
                    async clear() {
                        return await db.chatHistory.clear();
                    }
                };
            }
            
            console.log('✅ قاعدة البيانات جاهزة');
        })();

                {
                    keywords: ['اكتئاب', 'حزن', 'ضيق', 'تعب نفسي', 'مشاعر'],
                    reply: '🧠 **الصحة النفسية**:\n• أعراض الاكتئاب: حزن مستمر، فقدان متعة، تعب\n• مساعدة: تحدث مع شخص تثق به، ممارسة رياضة\n• متى تزور طبيب: إذا استمرت الأعراض أكثر من أسبوعين'
                },
                {
                    keywords: ['قلق', 'توتر', 'stress', 'خوف', 'نرفزة'],
                    reply: '😰 **القلق والتوتر**:\n• أعراض: خفقان، تعرق، أرق، صعوبة تركيز\n• تمارين تنفس: شهيق 4 ثوان، زفير 6 ثوان\n• تجنب: كافيين، سهر، تفكير زائد'
                },
                {
                    keywords: ['أرق', 'نوم', 'لا أنام', 'sleep'],
                    reply: '😴 **الأرق ومشاكل النوم**:\n• نصائح: روتين نوم ثابت، غرفة مظلمة، تجنب شاشات قبل النوم\n• تجنب: قهوة بعد العصر، أكل دسم قبل النوم\n• إذا استمر: استشر طبيب'
                }
            ];

            // 8. الإسعافات الأولية والطوارئ
            const firstAid = [
                {
                    keywords: ['اسعافات', 'طوارئ', 'emergency', 'حادث', 'جرح'],
                    reply: '🚑 **إسعافات أولية**:\n• جرح: نظف بماء وصابون، ضع ضمادة\n• نزيف: اضغط على الجرح بقطعة قماش نظيفة\n• حروق: ماء بارد 15 دقيقة، لا تضع معجون أسنان\n• كسور: لا تحرك المصاب، اطلب إسعاف'
                },
                {
                    keywords: ['حروق', 'حرق', 'burn'],
                    reply: '🔥 **علاج الحروق**:\n• درجة أولى: احمرار (ماء بارد، كريم مرطب)\n• درجة ثانية: فقاعات (لا تفتحها، استشر طبيب)\n• درجة ثالثة: تفحم الجلد (اتصل بإسعاف فوراً)'
                }
            ];

            // 9. الأدوية والعلاجات
            const medications = [
                {
                    keywords: ['دواء', 'علاج', 'medicine', 'حبوب', 'أقراص'],
                    reply: '💊 **استشارة دوائية**:\n• تناول الدواء بانتظام حسب وصف الطبيب\n• لا توقف دواء الضغط أو السكر بدون استشارة\n• احذر: تداخلات دوائية، أخبر طبيبك بكل أدويتك'
                },
                {
                    keywords: ['مضاد حيوي', 'antibiotic', 'مضاد'],
                    reply: '💊 **مضادات حيوية**:\n• لا تستخدمها بدون وصفة طبية\n• أكمل الجرعة كاملة حتى لو تحسنت\n• لا تفيد في الأمراض الفيروسية (برد، إنفلونزا)'
                }
            ];

            // 10. استشارات عامة
            const generalAdvice = [
                {
                    keywords: ['طبيب', 'عيادة', 'مستشفى', 'doctor', 'hospital'],
                    reply: '🏥 **استشارات طبية**:\n• لمعرفة أقرب مستشفى: افتح صفحة "المستشفيات"\n• للحجز: يمكنك الاتصال بالعيادات مباشرة\n• طوارئ: اتصل على 123'
                },
                {
                    keywords: ['تحليل', 'فحص', 'اختبار', 'تحاليل'],
                    reply: '🔬 **التحاليل الطبية**:\n• صورة دم كاملة: تقييم عام للصحة\n• سكر صائم: لتشخيص السكري\n• وظائف كبد وكلى: لمتابعة أعضاء حيوية\n• استشر طبيب لتفسير النتائج'
                },
                {
                    keywords: ['مرض', 'diagnosis', 'تشخيص', 'اعراض'],
                    reply: '🔍 **تشخيص مبكر**:\n• لتحليل الأعراض بدقة، استخدم صفحة "التشخيص"\n• نصائح: لا تعتمد على التشخيص الذاتي فقط\n• استشر طبيب للحصول على تشخيص دقيق'
                }
            ];

            // دمج جميع الفئات
            const allResponses = [
                ...commonDiseases,
                ...symptoms,
                ...chronicDiseases,
                ...womensHealth,
                ...childHealth,
                ...nutrition,
                ...mentalHealth,
                ...firstAid,
                ...medications,
                ...generalAdvice
            ];

            // الردود الافتراضية للأسئلة غير الطبية
            const fallbackResponses = [
                "🩺 **أنا مساعد طبي** وأجيب عن الأسئلة الصحية فقط.\n\nيمكنك سؤالي عن:\n• أعراض أمراض\n• حالات صحية\n• أدوية وعلاجات\n• تغذية وصحة\n• إسعافات أولية\n• صحة نفسية",
                
                "💙 **كيف أساعدك طبياً؟**\n\nجرب أن تسأل عن:\n• صداع أو حمى\n• أعراض مرض معين\n• نصائح صحية\n• تغذية وريجيم\n• صحة أطفال\n• صحة المرأة",
                
                "🏥 **الأسئلة الطبية المتاحة**:\n• الأمراض الشائعة (برد، سكر، ضغط)\n• الأعراض (صداع، كحة، ألم)\n• التغذية والحميات\n• الصحة النفسية\n• الإسعافات الأولية\n• الأدوية والعلاجات"
            ];

            // دالة للبحث عن الإجابة المناسبة
            function getMedicalReply(text) {
                const lower = text.trim().toLowerCase();
                
                // البحث في قاعدة المعرفة
                for (let entry of allResponses) {
                    if (entry.keywords.some(keyword => lower.includes(keyword))) {
                        return entry.reply;
                    }
                }
                
                // التحقق من وجود كلمات دالة أخرى
                const medicalTerms = ['مرض', 'علاج', 'دواء', 'طبيب', 'مستشفى', 'اعراض', 'صحة', 'الم', 'وجع', 'حمى', 'كحة', 'ألم', 'مشكلة'];
                if (medicalTerms.some(term => lower.includes(term))) {
                    return "🔍 **لم أجد تطابقاً دقيقاً.**\n\nهل يمكنك توضيح سؤالك أكثر؟ مثال:\n• ما هي أعراض [المرض]؟\n• كيف أعالج [العرض]؟\n• نصائح لتحسين [الحالة]؟";
                }
                
                // أسئلة الترحيب
                if (lower.includes('السلام') || lower.includes('hello') || lower.includes('hi') || lower.includes('مرحبا')) {
                    return "👋 **وعليكم السلام!**\nأنا مساعدك الطبي الذكي، كيف أستطيع مساعدتك اليوم؟\n\nيمكنك سؤالي عن أي عرض صحي أو حالة طبية.";
                }
                
                // إذا لم يجد أي تطابق
                return fallbackResponses[Math.floor(Math.random() * fallbackResponses.length)];
            }

            // دوال مساعدة
            function getCurrentTime() {
                return new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
            }

            function appendMessage(role, content, save = true) {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${role}`;
                const formattedContent = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                msgDiv.innerHTML = `
                    <div class="bubble">
                        <p>${formattedContent.replace(/\n/g, '<br>')}</p>
                        <span class="timestamp">${getCurrentTime()}</span>
                    </div>
                `;
                chatWindow.appendChild(msgDiv);
                chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
                if (save) saveToStorage(role, content);
            }

            function showTypingIndicator() {
                const indicator = document.createElement('div');
                indicator.className = 'message ai';
                indicator.id = 'typingIndicator';
                indicator.innerHTML = `
                    <div class="typing-indicator">
                        <div class="typing-dots">
                            <span></span><span></span><span></span>
                        </div>
                        <span class="typing-text">المساعد الطبي يكتب...</span>
                    </div>
                `;
                chatWindow.appendChild(indicator);
                chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
            }

            function hideTypingIndicator() {
                const el = document.getElementById('typingIndicator');
                if (el) el.remove();
            }

            function saveToStorage(role, text) {
                try {
                    const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                    history.push({ role, text, time: getCurrentTime() });
                    if (history.length > 60) history.shift();
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
                    
                    if (window.idosDB && window.idosDB.chat) {
                        window.idosDB.chat.add({
                            author: role,
                            message: text,
                            timestamp: new Date().toISOString()
                        }).catch(err => console.log('خطأ في حفظ المحادثة في Dexie:', err));
                    }
                } catch (e) {}
            }

            function loadHistory() {
                try {
                    const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                    if (history.length) {
                        history.forEach(msg => appendMessage(msg.role, msg.text, false));
                    } else {
                        appendMessage('ai', '🩺 **مرحباً بك في المساعد الطبي الذكي**\n\nأستطيع الإجابة على جميع أسئلتك الطبية:\n\n• **أعراض الأمراض** (صداع، حمى، كحة، ألم)\n• **الأمراض المزمنة** (سكر، ضغط، قلب)\n• **صحة المرأة والطفل**\n• **التغذية والحميات**\n• **الصحة النفسية**\n• **الإسعافات الأولية**\n• **الأدوية والعلاجات**\n\n**كيف يمكنني مساعدتك اليوم؟**', true);
                    }
                } catch (e) {
                    appendMessage('ai', 'مرحباً، أنا المساعد الطبي. اسألني عن أي عرض صحي.', true);
                }
            }

            function clearHistory() {
                if (confirm('هل أنت متأكد من مسح جميع المحادثات؟')) {
                    localStorage.removeItem(STORAGE_KEY);
                    chatWindow.innerHTML = '';
                    appendMessage('ai', '🧹 تم مسح المحادثة. كيف يمكنني مساعدتك طبياً؟', true);
                }
            }

            // أحداث الصفحة
            chatForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const userMsg = chatInput.value.trim();
                if (!userMsg) return;

                appendMessage('user', userMsg);
                chatInput.value = '';

                showTypingIndicator();

                setTimeout(() => {
                    hideTypingIndicator();
                    const reply = getMedicalReply(userMsg);
                    appendMessage('ai', reply);
                }, 900 + Math.random() * 600);
            });

            clearBtn.addEventListener('click', clearHistory);

            // بدء التشغيل
            loadHistory();
            chatInput.focus();
            
            console.log('✅ تم تحميل صفحة المحادثة بنجاح');
        })();
    </script>
</body>
</html>
